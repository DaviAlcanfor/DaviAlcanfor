<svg width="100%" viewBox="0 0 680 178" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>stack terminal block</title>
  <defs>
    <style>
      .prompt { fill: #e05252; font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .cmd    { fill: #e8e8e8; font-family: 'Courier New', Courier, monospace; font-size: 13px; }
      .key    { fill: #7ec8a4; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
      .val    { fill: #c8c8c8; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
    </style>
  </defs>

  <rect x="0" y="0" width="680" height="28" rx="4" fill="#1e1e1e"/>
  <text x="12" y="18" class="prompt">┌─[davi@picpay]─[~]─$</text>
  <text x="195" y="18" class="cmd"> cat stack.txt</text>

  <rect x="0" y="28" width="680" height="148" rx="0" fill="#252526"/>
  <rect x="0" y="28" width="3" height="148" fill="#e05252"/>
  <text x="20" y="50"  class="key">[ Time Series ]  </text><text x="160" y="50"  class="val">Prophet · LightGBM · MinTrace</text>
  <text x="20" y="68"  class="key">[ ML ]           </text><text x="160" y="68"  class="val">LightGBM · Optuna · Walk-forward Validation · K-Means</text>
  <text x="20" y="86"  class="key">[ Database ]     </text><text x="160" y="86"  class="val">PostgreSQL · MongoDB · MySQL · Redis</text>
  <text x="20" y="104" class="key">[ Backend ]      </text><text x="160" y="104" class="val">FastAPI · Spring Boot · Flask · Rails</text>
  <text x="20" y="122" class="key">[ Frontend ]     </text><text x="160" y="122" class="val">React · HTML · CSS</text>
  <text x="20" y="140" class="key">[ Languages ]    </text><text x="160" y="140" class="val">Python · SQL · Rust · Java · JavaScript</text>
  <text x="20" y="158" class="key">[ Tools ]        </text><text x="160" y="158" class="val">Git · Docker · Linux</text>
</svg>
